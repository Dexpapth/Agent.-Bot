<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BankBot AI — Flask Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary:#1a3c6e; --accent:#f0a500; --bg:#f4f6fb; --card:#fff;
      --text:#1c2231; --muted:#6b7280; --border:#dde3f0;
      --bot-bubble:#eef2ff; --user-bubble:#1a3c6e;
      --success:#16a34a; --error:#dc2626; --shadow:0 4px 24px rgba(26,60,110,.10);
      --radius:14px; --radius-sm:8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    /* HEADER */
    header{background:var(--primary);color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18);}
    .brand{display:flex;align-items:center;gap:10px;font-size:1.2rem;font-weight:700;}
    .brand-dot{width:9px;height:9px;background:#4ade80;border-radius:50%;animation:pulse 1.8s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.4);}}
    .hdr-right{display:flex;align-items:center;gap:8px;}
    .role-badge{background:var(--accent);color:#1c1c1c;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
    .hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:.78rem;transition:background .2s;}
    .hdr-btn:hover{background:rgba(255,255,255,.28);}
    /* MAIN */
    main{display:flex;flex:1;gap:18px;padding:20px;max-width:1200px;margin:0 auto;width:100%;}
    /* SIDEBAR */
    .sidebar{width:240px;min-width:200px;display:flex;flex-direction:column;gap:14px;}
    .card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:1px solid var(--border);}
    .card-title{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;}
    .qa-btn{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.8rem;cursor:pointer;color:var(--text);text-align:left;margin-bottom:7px;transition:all .2s;}
    .qa-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
    .stat-row{display:flex;gap:8px;margin-bottom:4px;}
    .stat-box{flex:1;background:var(--bg);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;border:1px solid var(--border);}
    .stat-val{font-size:1.1rem;font-weight:700;color:var(--primary);}
    .stat-lbl{font-size:.64rem;color:var(--muted);margin-top:2px;}
    /* CHAT */
    .chat-panel{flex:1;display:flex;flex-direction:column;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;min-height:0;}
    .chat-header{background:linear-gradient(135deg,var(--primary) 60%,#2b5aa0);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;}
    .bot-avatar{width:40px;height:40px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
    .chat-header h2{font-size:.95rem;font-weight:700;}
    .chat-header p{font-size:.72rem;opacity:.8;margin-top:1px;}
    .status-dot{display:inline-block;width:7px;height:7px;background:#4ade80;border-radius:50%;margin-right:4px;animation:pulse 1.8s infinite;}
    .chat-actions{margin-left:auto;display:flex;gap:6px;}
    .chat-actions button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;padding:4px 11px;font-size:.72rem;cursor:pointer;transition:background .2s;}
    .chat-actions button:hover{background:rgba(255,255,255,.28);}
    /* MESSAGES */
    .chat-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
    .chat-messages::-webkit-scrollbar{width:4px;}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    .msg-row{display:flex;gap:9px;align-items:flex-end;animation:slideIn .25s ease;}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .msg-row.user{flex-direction:row-reverse;}
    .msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
    .bot-av{background:var(--primary);color:#fff;}
    .user-av{background:var(--accent);color:#1c1c1c;}
    .bubble{max-width:74%;padding:11px 15px;border-radius:18px;font-size:.85rem;line-height:1.65;white-space:pre-wrap;}
    .msg-row.bot .bubble{background:var(--bot-bubble);border-bottom-left-radius:4px;color:var(--text);}
    .msg-row.user .bubble{background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px;}
    .msg-time{font-size:.62rem;color:var(--muted);margin-top:3px;}
    .msg-row.user .msg-time{text-align:right;}
    /* TYPING */
    .typing-indicator{display:flex;gap:4px;padding:11px 15px;background:var(--bot-bubble);border-radius:18px;border-bottom-left-radius:4px;width:fit-content;}
    .typing-indicator span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
    .typing-indicator span:nth-child(2){animation-delay:.2s;}
    .typing-indicator span:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}
    /* EMI FORM in chat */
    .emi-form{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:10px;}
    .emi-form label{font-size:.75rem;font-weight:600;color:var(--muted);display:block;margin-bottom:3px;margin-top:10px;}
    .emi-form label:first-child{margin-top:0;}
    .emi-form input{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:8px 10px;font-size:.84rem;outline:none;font-family:'Inter',sans-serif;}
    .emi-form input:focus{border-color:var(--primary);}
    .emi-form button{margin-top:12px;padding:8px 18px;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:.82rem;font-weight:700;cursor:pointer;transition:background .2s;}
    .emi-form button:hover{background:#2b5aa0;}
    .emi-result{margin-top:10px;background:var(--bg);border-radius:6px;padding:10px 12px;font-size:.82rem;line-height:1.8;border:1px solid var(--border);}
    .emi-err{color:var(--error);font-size:.72rem;margin-top:4px;font-weight:600;}
    .emi-bar{display:flex;width:100%;height:16px;border-radius:8px;overflow:hidden;margin:8px 0;border:1px solid var(--border);}
    .emi-bar-principal{background:var(--primary);height:100%;}
    .emi-bar-interest{background:var(--accent);height:100%;}
    .emi-legend{display:flex;gap:14px;font-size:.72rem;color:var(--muted);margin-bottom:6px;}
    .emi-legend span{display:inline-flex;align-items:center;gap:5px;}
    .emi-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
    /* SUGGESTIONS */
    .suggestions{padding:8px 18px 5px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border);background:#fafbff;}
    .chip{padding:5px 13px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;font-size:.75rem;cursor:pointer;transition:all .18s;}
    .chip:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
    /* INPUT */
    .chat-input-row{padding:12px 18px;display:flex;gap:9px;align-items:flex-end;background:var(--card);border-top:1px solid var(--border);}
    #chatInput{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 13px;font-size:.85rem;font-family:'Inter',sans-serif;resize:none;min-height:38px;max-height:110px;outline:none;transition:border-color .2s;}
    #chatInput:focus{border-color:#2b5aa0;}
    #sendBtn{width:40px;height:40px;background:var(--primary);border:none;border-radius:var(--radius-sm);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s;}
    #sendBtn:hover{background:#2b5aa0;}
    #sendBtn:active{transform:scale(.93);}
    /* ALERT */
    #alertBanner{display:none;position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:150;padding:11px 20px;border-radius:8px;font-size:.82rem;font-weight:500;box-shadow:var(--shadow);animation:slideIn .25s ease;}
    #alertBanner.success{background:#dcfce7;color:var(--success);border:1px solid #86efac;}
    #alertBanner.error{background:#fee2e2;color:var(--error);border:1px solid #fca5a5;}
    #alertBanner.warning{background:#fef9c3;color:#d97706;border:1px solid #fde047;}
    @media(max-width:768px){main{flex-direction:column;padding:10px;}.sidebar{width:100%;min-width:unset;}}
  </style>
</head>
<body>

<div id="alertBanner"></div>

<header>
  <div class="brand">
    🏦 BankBot<span style="color:var(--accent)">AI</span>
    <div class="brand-dot"></div>
    <span style="font-size:.7rem;font-weight:400;opacity:.7;margin-left:4px;">Flask Edition</span>
  </div>
  <div class="hdr-right">
    <div class="role-badge" id="roleBadge">👤 {{ role }}</div>
    <button class="hdr-btn" onclick="clearChat()">🗑 Clear</button>
    <button class="hdr-btn" onclick="window.location='/logout'" style="background:rgba(220,38,38,.35);">🚪 Logout</button>
  </div>
</header>

<main>
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="card">
      <div class="card-title">⚡ Quick Actions</div>
      <button class="qa-btn" onclick="send('Check my balance')">💳 Check Balance</button>
      <button class="qa-btn" onclick="send('Transfer money')">💸 Transfer Funds</button>
      <button class="qa-btn" onclick="send('Show statement')">📋 Mini Statement</button>
      <button class="qa-btn" onclick="send('Loan information')">🏠 Loan Info</button>
      <button class="qa-btn" onclick="send('EMI calculator')">🧮 EMI Calculator</button>
      <button class="qa-btn" onclick="send('Block my card')">🔴 Block Card</button>
      <button class="qa-btn" onclick="send('Report fraud')">🚨 Report Fraud</button>
      <button class="qa-btn" onclick="send('Nearest ATM')">📍 Find ATM</button>
    </div>
    <div class="card">
      <div class="card-title">📈 Session Info</div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val" id="msgCount">0</div><div class="stat-lbl">Messages</div></div>
        <div class="stat-box"><div class="stat-val" id="sessionTime">0m</div><div class="stat-lbl">Session</div></div>
      </div>
      <div class="stat-row" style="margin-top:7px;">
        <div class="stat-box"><div class="stat-val" style="font-size:.8rem;color:var(--success);">● Active</div><div class="stat-lbl">Status</div></div>
        <div class="stat-box"><div class="stat-val" id="roleLabel" style="font-size:.85rem;">{{ role|capitalize }}</div><div class="stat-lbl">Role</div></div>
      </div>
    </div>
  </aside>

  <!-- CHAT PANEL -->
  <section class="chat-panel">
    <div class="chat-header">
      <div class="bot-avatar">🤖</div>
      <div>
        <h2>BankBot AI Assistant</h2>
        <p><span class="status-dot"></span>Online — Python Flask Backend</p>
      </div>
      <div class="chat-actions">
        <button onclick="clearChat()">🗑 Clear</button>
        <button onclick="exportChat()">⬇ Export</button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="suggestions" id="suggestionsBar">
      <span class="chip" onclick="send('Check balance')">Check balance</span>
      <span class="chip" onclick="send('Transfer money')">Transfer money</span>
      <span class="chip" onclick="send('Loan info')">Loan info</span>
      <span class="chip" onclick="send('Help')">Help</span>
    </div>

    <div class="chat-input-row">
      <textarea id="chatInput" rows="1" placeholder="Type your banking question here…"
                onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </section>
</main>

<script>
  // ── State ──────────────────────────────────────────────────
  let msgCount  = 0;
  let chatLog   = [];
  const start   = Date.now();

  // Session timer
  setInterval(() => {
    document.getElementById('sessionTime').textContent =
      Math.floor((Date.now() - start) / 60000) + 'm';
  }, 10000);

  // ── Show alert banner ──────────────────────────────────────
  function showAlert(msg, type = 'success') {
    const b = document.getElementById('alertBanner');
    b.textContent = msg;
    b.className   = type;
    b.style.display = 'block';
    setTimeout(() => b.style.display = 'none', 3000);
  }

  // ── Add a message bubble to the chat ──────────────────────
  function addMessage(who, text) {
    const box = document.getElementById('chatMessages');
    const row = document.createElement('div');
    row.className = `msg-row ${who}`;

    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const avHTML = who === 'bot'
      ? '<div class="msg-avatar bot-av">🤖</div>'
      : '<div class="msg-avatar user-av">👤</div>';

    row.innerHTML = `
      ${avHTML}
      <div>
        <div class="bubble">${text}</div>
        <div class="msg-time">${time}</div>
      </div>`;
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;

    msgCount++;
    document.getElementById('msgCount').textContent = msgCount;
    chatLog.push({ who, text, time });
  }

  // ── Typing indicator ──────────────────────────────────────
  function showTyping() {
    const box = document.getElementById('chatMessages');
    const el  = document.createElement('div');
    el.id = 'typing';
    el.className = 'msg-row bot';
    el.innerHTML = `<div class="msg-avatar bot-av">🤖</div>
      <div class="typing-indicator"><span></span><span></span><span></span></div>`;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
  }
  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  // ── Show EMI form inside chat ─────────────────────────────
  function showEmiForm() {
    const formHtml = `
      <b>🧮 EMI Calculator</b>
      <div class="emi-form" id="emiForm">
        <label>Loan Amount (INR)</label>
        <input type="number" id="emiP" placeholder="e.g. 500000" min="1" step="any" inputmode="decimal" oninput="sanitizeEmiInput(this)"/>
        <label>Annual Interest Rate (%)</label>
        <input type="number" id="emiR" placeholder="e.g. 9.5" min="0" step="any" inputmode="decimal" oninput="sanitizeEmiInput(this)"/>
        <label>Loan Tenure (months)</label>
        <input type="number" id="emiN" placeholder="e.g. 60" min="1" step="1" inputmode="numeric" oninput="sanitizeEmiInput(this)"/>
        <button onclick="calcEmi()">Calculate EMI</button>
        <div id="emiResult"></div>
      </div>`;
    addMessage('bot', formHtml);
  }

  // ── Block negative signs / letters as the user types ───────
  function sanitizeEmiInput(el) {
    // number inputs already block letters; this also strips '-', '+', 'e'
    el.value = el.value.replace(/[^0-9.]/g, '');
  }

  // ── Validate EMI form fields, return {p, r, n} or null ─────
  function validateEmiInputs() {
    const pEl = document.getElementById('emiP');
    const rEl = document.getElementById('emiR');
    const nEl = document.getElementById('emiN');
    const resultBox = document.getElementById('emiResult');

    const pRaw = pEl.value.trim();
    const rRaw = rEl.value.trim();
    const nRaw = nEl.value.trim();

    // Reject empty or non-numeric (letters, symbols) input
    const numRe = /^\d+(\.\d+)?$/;
    if (!numRe.test(pRaw) || !numRe.test(rRaw) || !numRe.test(nRaw)) {
      resultBox.innerHTML = `<div class="emi-err">❌ Please enter valid numbers only (no letters or symbols).</div>`;
      return null;
    }

    const p = parseFloat(pRaw);
    const r = parseFloat(rRaw);
    const n = parseInt(nRaw, 10);

    // Reject negatives / zero principal & tenure
    if (p <= 0) {
      resultBox.innerHTML = `<div class="emi-err">❌ Loan amount must be greater than 0.</div>`;
      return null;
    }
    if (r < 0) {
      resultBox.innerHTML = `<div class="emi-err">❌ Interest rate cannot be negative.</div>`;
      return null;
    }
    if (n <= 0 || !Number.isInteger(n)) {
      resultBox.innerHTML = `<div class="emi-err">❌ Tenure must be a whole number of months, greater than 0.</div>`;
      return null;
    }

    return { p, r, n };
  }

  async function calcEmi() {
    const vals = validateEmiInputs();
    if (!vals) return;
    const { p, r, n } = vals;

    let res, data;
    try {
      res = await fetch('/emi', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ principal: p, rate: r, months: n })
      });
      data = await res.json();
    } catch (err) {
      document.getElementById('emiResult').innerHTML = `<div class="emi-err">❌ Connection error. Please try again.</div>`;
      return;
    }

    if (data.error) {
      document.getElementById('emiResult').innerHTML = `<div class="emi-err">❌ ${data.error}</div>`;
      return;
    }

    const principalPct = (p / data.total_payment) * 100;
    const interestPct  = 100 - principalPct;

    document.getElementById('emiResult').innerHTML = `
      <div class="emi-result">
        Monthly EMI: <b>INR ${data.emi.toLocaleString('en-IN', {minimumFractionDigits:2})}</b><br>
        Total Interest: INR ${data.total_interest.toLocaleString('en-IN', {minimumFractionDigits:2})}<br>
        Total Repayment: INR ${data.total_payment.toLocaleString('en-IN', {minimumFractionDigits:2})}
        <div class="emi-legend">
          <span><i class="emi-dot" style="background:var(--primary)"></i>Principal (${principalPct.toFixed(1)}%)</span>
          <span><i class="emi-dot" style="background:var(--accent)"></i>Interest (${interestPct.toFixed(1)}%)</span>
        </div>
        <div class="emi-bar">
          <div class="emi-bar-principal" style="width:${principalPct}%"></div>
          <div class="emi-bar-interest" style="width:${interestPct}%"></div>
        </div>
      </div>`;
  }

  // ── Send message to Flask backend ─────────────────────────
  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text  = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value  = '';
    input.style.height = '';

    showTyping();

    try {
      const res  = await fetch('/chat', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ message: text })
      });
      const data = await res.json();
      hideTyping();

      if (data.emi_mode) {
        showEmiForm();
      } else {
        addMessage('bot', data.reply || 'Sorry, something went wrong.');
      }
    } catch (err) {
      hideTyping();
      addMessage('bot', 'Connection error. Please check the server.');
    }
  }

  // ── Quick-send helper ──────────────────────────────────────
  function send(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
  }

  // ── Key handler (Enter sends, Shift+Enter = newline) ──────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  // ── Auto-resize textarea ──────────────────────────────────
  function autoResize(el) {
    el.style.height = '';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
  }

  // ── Clear chat ────────────────────────────────────────────
  function clearChat() {
    document.getElementById('chatMessages').innerHTML = '';
    msgCount = 0;
    chatLog  = [];
    document.getElementById('msgCount').textContent = '0';
    setTimeout(() => send('hello'), 200);
  }

  // ── Export chat ───────────────────────────────────────────
  function exportChat() {
    const txt = chatLog.map(m => `[${m.time}] ${m.who.toUpperCase()}: ${m.text}`).join('\n\n');
    const a   = document.createElement('a');
    a.href    = 'data:text/plain;charset=utf-8,' + encodeURIComponent(txt);
    a.download = 'bankbot_session.txt';
    a.click();
    showAlert('Chat exported!', 'success');
  }

  // ── Init — send greeting on page load ─────────────────────
  window.addEventListener('load', () => {
    setTimeout(() => send('hello'), 300);
  });
</script>
</body>
</html>
